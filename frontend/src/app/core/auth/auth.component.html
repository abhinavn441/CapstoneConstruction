<h2>Log In</h2>

<form (ngSubmit)="onLogin()">
    <div class="dx-fieldset">
        <div class="dx-fieldset-header">Enter Login Details</div>
        <div class="dx-field">
            <div class="dx-field-label">User Name</div>
            <dx-text-box class="dx-field-value" [(value)]="username" [inputAttr]="{ 'aria-label': 'User Name' }"
                [showClearButton]="true">
            </dx-text-box>
        </div>

        <div class="dx-field">
            <div class="dx-field-label">Password</div>
            <dx-text-box class="dx-field-value" [(value)]="password" [inputAttr]="{ 'aria-label': 'Password' }"
                [mode]="'password'" [showClearButton]="true">
            </dx-text-box>
        </div>
    </div>
    <div class="buttons">
        <div>
            <dx-button stylingMode="contained" text="Log In" type="default" [width]="120" (onClick)="onLogin()"
                [disabled]="logging()">
            </dx-button>
        </div>
    </div>
</form>
