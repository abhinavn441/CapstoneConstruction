<h2>Update Project</h2>

<form (ngSubmit)="submit()">
  <div class="dx-fieldset">
    <div class="dx-fieldset-header">Update Project Details</div>
    <div class="dx-field">
      <div class="dx-field-label">Project Name</div>
      <dx-text-box class="dx-field-value" [value]="model.projectName" [inputAttr]="{ 'aria-label': 'Project Name' }"
        [showClearButton]="true">
      </dx-text-box>
    </div>

    <div class="dx-field">
      <div class="dx-field-label">Description</div>
      <dx-text-box class="dx-field-value" [value]="model.projectDescription"
        [inputAttr]="{ 'aria-label': 'Project Desc' }" [showClearButton]="true">
      </dx-text-box>
    </div>

    <div class="dx-field">
      <div class="dx-field-label">End Date</div>
      <dx-date-box class="dx-field-value" [(value)]="model.endDate"
        [inputAttr]="{ 'aria-label': 'End Date' }" [showClearButton]="true">
      </dx-date-box>
    </div>

    <div class="dx-field">
      <div class="dx-field-label">Status</div>
      <dx-select-box class="dx-field-value" [(value)]="model.status"
        [dataSource]="statusOptions" displayExpr="name" valueExpr="id" [inputAttr]="{ 'aria-label': 'Status' }"
        [showClearButton]="true"></dx-select-box>
    </div>

    <div class="dx-field">
      <div class="dx-field-label">Actual Cost</div>
      <dx-number-box class="dx-field-value" [(value)]="model.actualCost" [inputAttr]="{ 'aria-label': 'Actual Cost' }" format="currency"
        [showClearButton]="true">
      </dx-number-box>
    </div>
  </div>
  <div class="buttons">
    <div>
      <dx-button stylingMode="contained" text="Back" type="normal" [width]="120" (onClick)="back()">
      </dx-button>
    </div>
    <div>
      <dx-button stylingMode="contained" text="Update" type="success" [width]="120" (onClick)="submit()">
      </dx-button>
    </div>
  </div>
</form>
