<h2>Projects</h2>
@if(loading()) {
<div>Loading projects...</div>
}

@if(!loading()) {
<dx-data-grid [dataSource]="projects()" [showBorders]="true" [columnAutoWidth]="true" [rowAlternationEnabled]="true"
  (onSelectionChanged)="onSelectionChanged($event)" [hoverStateEnabled]="true" [keyExpr]="'projectId'">

  <dxo-paging [pageSize]="10"></dxo-paging>
  <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[10, 25, 50, 100]" [showInfo]="true">
  </dxo-pager>

  <dxo-filter-row [visible]="true"></dxo-filter-row>
  <dxo-header-filter [visible]="true"></dxo-header-filter>
  <dxo-search-panel [visible]="true" [width]="240" placeholder="Search..."></dxo-search-panel>
  <dxo-export [enabled]="false" [allowExportSelectedData]="true"></dxo-export>
  <dxo-selection mode="multiple"></dxo-selection>

  <dxi-column dataField="projectId" caption="Id" [width]="80" [allowHeaderFiltering]="false"></dxi-column>
  <dxi-column dataField="projectName" caption="Name" [allowHeaderFiltering]="false"></dxi-column>
  <dxi-column dataField="status" caption="Status"
    [lookup]="{ dataSource: statusOptions, displayExpr: 'name', valueExpr: 'id' }"
    [allowFiltering]="false"></dxi-column>
  <dxi-column dataField="startDate" caption="Start Date" dataType="date" format="yyyy-MMM-dd"></dxi-column>
  <dxi-column dataField="endDate" caption="End Date" dataType="date" format="yyyy-MMM-dd"></dxi-column>
  <dxi-column dataField="managerName" caption="Manager"></dxi-column>
  <dxi-column dataField="estimatedBudget" caption="Budget" dataType="number" format="currency"
    [allowHeaderFiltering]="false"></dxi-column>
  <dxi-column dataField="actualCost" caption="Actual Cost" dataType="number" format="currency"
    [allowHeaderFiltering]="false"></dxi-column>
</dx-data-grid>
}

@if(!loading() && projects().length===0) {
<div>
  No projects found.
</div>
}
<div class="list-buttons">
  <dx-button stylingMode="contained" text="Back" type="normal" [width]="120" (onClick)="back()"></dx-button>
  <dx-button stylingMode="contained" text="Create Project" type="default" [width]="120"
    (onClick)="toCreateProjects()"></dx-button>
  <dx-button stylingMode="contained" text="Delete" type="danger" [width]="120" (onClick)="deleteSelected()"
    [disabled]="selectedKeys().length === 0"></dx-button>
  <dx-button stylingMode="contained" text="Update" type="success" [width]="120" (onClick)="updateSelected()"
    [disabled]="selectedKeys().length === 0 || selectedKeys().length > 1"></dx-button>
</div>
