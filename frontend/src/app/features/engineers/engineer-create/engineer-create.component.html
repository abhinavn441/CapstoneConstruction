<h2>Add Engineer</h2>
<form (ngSubmit)="submit()">
  <div class= "dx-fieldset">
    <div class="dx-fieldset-header">Enter Engineer Details</div>
    <div class="dx-field">
      <div class="dx-field-label">Name</div>
      <dx-text-box class="dx-field-value" [(value)]="model.engineerName" [inputAttr]="{ 'aria-label': 'Engineer Name' }"
        [showClearButton]="true">
      </dx-text-box>
    </div>

    <div class="dx-field">
      <div class="dx-field-label">Role</div>
      <dx-text-box class="dx-field-value" [(value)]="model.engineerRole" [inputAttr]="{ 'aria-label': 'Engineer Role' }"
        [showClearButton]="true">
      </dx-text-box>
    </div>
  </div>
  <div class="buttons">
    <div>
      <dx-button stylingMode="contained" text="Back" type="normal" [width]="120" (onClick)="back()">
      </dx-button>
    </div>
    <div>
      <dx-button stylingMode="contained" text="Create" type="success" [width]="120" (onClick)="submit()">
      </dx-button>
    </div>
  </div>
</form>
