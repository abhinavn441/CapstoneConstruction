<h2>Update Project</h2>

<form (ngSubmit)="submit()">
    <div class="dx-fieldset">
        <div class="dx-fieldset-header">Update Task Details</div>
        <div class="dx-field">
            <div class="dx-field-label">Task Name</div>
            <dx-text-box class="dx-field-value" [value]="model.taskName" [inputAttr]="{ 'aria-label': 'Task Name' }"
                [showClearButton]="true">
            </dx-text-box>
        </div>
        <div class="dx-field">
            <div class="dx-field-label">Description</div>
            <dx-text-box class="dx-field-value" [value]="model.taskDescription"
                [inputAttr]="{ 'aria-label': 'Task Desc' }" [showClearButton]="true">
            </dx-text-box>
        </div>
        <div class="dx-field">
            <div class="dx-field-label">Engineer ID</div>
            <dx-number-box class="dx-field-value" [value]="model.engineerId ?? 0"
                (onValueChanged)="onEngineerIdChanged($event)" [inputAttr]="{ 'aria-label': 'Engineer ID' }"
                [showClearButton]="true">
            </dx-number-box>
        </div>
        <div class="dx-field">
            <div class="dx-field-label">Status</div>
            <dx-select-box class="dx-field-value" [(value)]="model.status" [dataSource]="statusOptions"
                displayExpr="name" valueExpr="id" [inputAttr]="{ 'aria-label': 'Status' }"
                [showClearButton]="true"></dx-select-box>
        </div>
    </div>
    <div class="buttons">
        <div>
            <dx-button stylingMode="contained" text="Back" type="normal" [width]="120" (onClick)="back()">
            </dx-button>
        </div>
        <div>
            <dx-button stylingMode="contained" text="Update" type="success" [width]="120" (onClick)="submit()">
            </dx-button>
        </div>
    </div>
</form>
